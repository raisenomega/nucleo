name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm install -g npm@11   # el lockfile es npm 11; CI trae npm 10
      - run: npm ci
      - run: npx vite build      # genera routeTree.gen.ts (gitignored) antes de tsc
      - run: npx tsc --noEmit
      - run: npx vitest run
      - run: bash scripts/validate-before-push.sh

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # gitleaks necesita el historial completo
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm install -g npm@11   # el lockfile es npm 11; CI trae npm 10
      - run: npm ci
      - run: npm audit --audit-level=high
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
